<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>City Runner 3D 🏃‍♂️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:none;font-family:sans-serif}
#gc{width:100vw;height:100dvh;display:block}
#ui{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none}
#sd{position:fixed;top:15px;left:20px;color:#fff;font-size:22px;font-weight:bold;text-shadow:0 2px 8px #0008}
#cd{position:fixed;top:15px;right:20px;color:#ffdd00;font-size:22px;font-weight:bold;text-shadow:0 2px 8px #0008}
#ov{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000c;color:#fff;text-align:center;padding:20px;pointer-events:auto;z-index:10}
#ov h1{font-size:clamp(32px,8vw,50px);color:#ffdd00;margin:0 0 8px;text-shadow:0 0 30px #ffdd0044}
#ov p{margin:4px 0;opacity:.8;font-size:16px}
#ov button{margin-top:20px;padding:16px 70px;font-size:26px;border:none;border-radius:30px;background:linear-gradient(135deg,#ffdd00,#ff9900);color:#111;font-weight:bold;pointer-events:auto;cursor:pointer;touch-action:manipulation;box-shadow:0 4px 20px #ffdd0066}
#ov button:active{transform:scale(.95)}
#go{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000c;color:#fff;text-align:center;padding:20px;pointer-events:auto;z-index:10}
#go h1{font-size:clamp(30px,7vw,46px);color:#f44;margin:0 0 10px}
#go .sf{font-size:24px;margin:3px 0}
#go button{margin-top:20px;padding:16px 70px;font-size:26px;border:none;border-radius:30px;background:linear-gradient(135deg,#ffdd00,#ff9900);color:#111;font-weight:bold;pointer-events:auto;cursor:pointer;box-shadow:0 4px 20px #ffdd0066}
#go button:active{transform:scale(.95)}
#btns{position:fixed;bottom:20px;left:0;right:0;display:flex;justify-content:space-between;padding:0 15px;pointer-events:none;z-index:5}
#btns button{pointer-events:auto;width:70px;height:70px;border-radius:50%;border:2px solid #fff3;background:#fff1;color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center;touch-action:manipulation;cursor:pointer;-webkit-tap-highlight-color:transparent;backdrop-filter:blur(4px)}
#btns button:active{background:#fff4}
#ab{width:80px;height:80px;background:rgba(255,200,50,.15);border-color:rgba(255,200,50,.4)!important;font-size:18px}
.h{display:none!important}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<div id="sd">🏃 0</div><div id="cd">⭐ 0</div>
<div id="ov"><h1>🚇 City Runner 3D</h1><p>Dodge cars & barriers • Collect coins</p><p style="font-size:15px;margin-top:8px">3D endless runner!</p><button id="pb">▶ PLAY</button><p style="font-size:13px;margin-top:15px;opacity:.6">Swipe to dodge • Tap to jump</p></div>
<div id="go" class="h"><h1>💥 GAME OVER</h1><p class="sf" id="fs">Score: 0</p><p class="sf" style="color:#ffdd00" id="fc">⭐ 0 coins</p><p style="opacity:.6;font-size:16px" id="bs">Best: 0</p><button id="rb">↻ Play Again</button></div>
<div id="btns"><button id="bl">◀</button><button id="ab">JUMP</button><button id="br">▶</button></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
'use strict';

// DOM
const ov=document.getElementById('ov');
const goDiv=document.getElementById('go');
const pb=document.getElementById('pb');
const rb=document.getElementById('rb');
const bl=document.getElementById('bl');
const br=document.getElementById('br');
const ab=document.getElementById('ab');
const sd=document.getElementById('sd');
const cdE=document.getElementById('cd');
const fs=document.getElementById('fs');
const fc=document.getElementById('fc');
const bs=document.getElementById('bs');

// THREE.JS SETUP
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('gc'),antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0a0a1e);
scene.fog=new THREE.Fog(0x0a0a1e,30,80);

const camera=new THREE.PerspectiveCamera(70,1,0.1,120);
camera.position.set(0,8,12);
camera.lookAt(0,0,-8);

const W=window.innerWidth,H=window.innerHeight;
renderer.setSize(W,H);
camera.aspect=W/H;
camera.updateProjectionMatrix();

// LIGHTS
const ambient=new THREE.AmbientLight(0x334466,0.5);
scene.add(ambient);

const moon=new THREE.DirectionalLight(0x8888ff,1.5);
moon.position.set(-10,20,10);
moon.castShadow=true;
moon.shadow.mapSize.width=1024;
moon.shadow.mapSize.height=1024;
moon.shadow.camera.near=0.5;
moon.shadow.camera.far=50;
moon.shadow.camera.left=-20;
moon.shadow.camera.right=20;
moon.shadow.camera.top=20;
moon.shadow.camera.bottom=-20;
scene.add(moon);

const fill=new THREE.DirectionalLight(0xff8844,0.4);
fill.position.set(10,5,-10);
scene.add(fill);

// STARS
const starGeo=new THREE.BufferGeometry();
const starCount=800;
const starPos=new Float32Array(starCount*3);
const starSizes=new Float32Array(starCount);
for(let i=0;i<starCount;i++){
  starPos[i*3]=(Math.random()-0.5)*200;
  starPos[i*3+1]=Math.random()*60+10;
  starPos[i*3+2]=-Math.random()*200-20;
  starSizes[i]=Math.random()*2+0.5;
}
starGeo.setAttribute('position',new THREE.BufferAttribute(starPos,3));
starGeo.setAttribute('size',new THREE.BufferAttribute(starSizes,1));
const starMat=new THREE.PointsMaterial({color:0xffffff,size:0.3,transparent:true,opacity:0.8});
const stars=new THREE.Points(starGeo,starMat);
scene.add(stars);

// GROUND
const groundGeo=new THREE.PlaneGeometry(20,200,1,1);
const groundMat=new THREE.MeshStandardMaterial({
  color:0x2a2a3a,
  roughness:0.8,
  metalness:0.2,
});
const ground=new THREE.Mesh(groundGeo,groundMat);
ground.rotation.x=-Math.PI/2;
ground.position.set(0,0,-50);
ground.receiveShadow=true;
scene.add(ground);

// LANE MARKERS
const laneMat=new THREE.MeshStandardMaterial({color:0x555570,emissive:0x222240,emissiveIntensity:0.3});
for(let i=0;i<3;i++){
  const lane=new THREE.Mesh(new THREE.PlaneGeometry(6.5,200),new THREE.MeshStandardMaterial({
    color:0x333345,roughness:0.9,metalness:0.1
  }));
  lane.rotation.x=-Math.PI/2;
  lane.position.set(-6.5+i*6.5,0.01,-50);
  scene.add(lane);
}

// BUILDINGS
const buildings=[];
const buildingColors=[0x252545,0x2a2a4a,0x303055,0x282848,0x333358,0x2d2d50,0x383860,0x2c2c4c];
function createBuilding(x,z){
  const w=2+Math.random()*3;
  const h=4+Math.random()*10;
  const d=2+Math.random()*3;
  const geo=new THREE.BoxGeometry(w,h,d);
  const mat=new THREE.MeshStandardMaterial({
    color:buildingColors[Math.floor(Math.random()*buildingColors.length)],
    roughness:0.7,metalness:0.1
  });
  const mesh=new THREE.Mesh(geo,mat);
  mesh.position.set(x,h/2,z);
  mesh.castShadow=true;
  mesh.receiveShadow=true;
  scene.add(mesh);
  
  // windows
  const winMat=new THREE.MeshStandardMaterial({
    color:0xffdd88,emissive:0xffdd88,emissiveIntensity:0.3+Math.random()*0.3
  });
  for(let wy=1;wy<h-1;wy+=1.5){
    for(let wx=-w/2+0.5;wx<w/2-0.3;wx+=1.2){
      if(Math.random()>0.3){
        const win=new THREE.Mesh(new THREE.PlaneGeometry(0.4,0.6),winMat);
        win.position.set(x+wx,wy,z+d/2+0.01);
        scene.add(win);
      }
    }
  }
  return mesh;
}

// Generate buildings along the road
for(let z=-5;z>-100;z-=4+Math.random()*3){
  const side=Math.random()>0.5?1:-1;
  const x=(9+Math.random()*3)*side;
  createBuilding(x,z);
  // opposite side
  if(Math.random()>0.4){
    const x2=-(9+Math.random()*3)*side;
    createBuilding(x2,z-2);
  }
}

// LAMP POSTS
const lampMat=new THREE.MeshStandardMaterial({color:0x888899,emissive:0x8888ff,emissiveIntensity:0.2});
const lampGeo=new THREE.CylinderGeometry(0.1,0.15,3);
function createLamp(x,z){
  const pole=new THREE.Mesh(lampGeo,new THREE.MeshStandardMaterial({color:0x555566}));
  pole.position.set(x,1.5,z);
  scene.add(pole);
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.3),lampMat);
  head.position.set(x,3.3,z);
  scene.add(head);
  const light=new THREE.PointLight(0x8888ff,0.3,6);
  light.position.set(x,3,z);
  scene.add(light);
}
for(let z=-5;z>-100;z-=8){
  createLamp(-8,z);
  createLamp(8,z);
}

// ========== GAME STATE ==========
let S={run:false,over:false,score:0,coins:0,highScore:0,spd:8,
  lane:1,laneTarget:1,laneX:[-6.5,0,6.5],
  jump:false,vy:0,grav:0.4,jp:-0.25,
  slide:false,slideT:0,
  playerMesh:null,playerGroup:null,
  obstacles:[],coinMeshes:[],
  z:0,frame:0,spawnZ:-20,nextSpawn:0,
  shkX:0,shkZ:0,
};

function makePlayer(){
  const g=new THREE.Group();
  
  // Body
  const body=new THREE.Mesh(
    new THREE.BoxGeometry(0.8,1.4,0.5),
    new THREE.MeshStandardMaterial({color:0x4488ff,roughness:0.3,metalness:0.1})
  );
  body.position.y=0.7;
  body.castShadow=true;
  g.add(body);
  
  // Head
  const head=new THREE.Mesh(
    new THREE.SphereGeometry(0.35,8,8),
    new THREE.MeshStandardMaterial({color:0xffccaa,roughness:0.4})
  );
  head.position.y=1.7;
  head.position.z=0.1;
  head.castShadow=true;
  g.add(head);
  
  // Hair
  const hair=new THREE.Mesh(
    new THREE.SphereGeometry(0.38,8,8,0,Math.PI*2,0,Math.PI/2),
    new THREE.MeshStandardMaterial({color:0xff8844,roughness:0.8})
  );
  hair.position.y=1.85;
  hair.position.z=0.1;
  g.add(hair);
  
  // Eyes
  const eyeMat=new THREE.MeshStandardMaterial({color:0x222222});
  for(let side of[-1,1]){
    const eye=new THREE.Mesh(new THREE.SphereGeometry(0.08,6,6),eyeMat);
    eye.position.set(side*0.12,1.65,0.4);
    g.add(eye);
    const white=new THREE.Mesh(new THREE.SphereGeometry(0.12,6,6),new THREE.MeshStandardMaterial({color:0xffffff}));
    white.position.set(side*0.12,1.65,0.35);
    g.add(white);
  }
  
  // Legs (two cylinders)
  const legMat=new THREE.MeshStandardMaterial({color:0x3366cc,roughness:0.5});
  for(let side of[-0.15,0.15]){
    const leg=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.12,0.4),legMat);
    leg.position.set(side,-0.2,0);
    leg.castShadow=true;
    g.add(leg);
  }
  
  // Arms
  const armMat=new THREE.MeshStandardMaterial({color:0x4488ff,roughness:0.3});
  for(let side of[-1,1]){
    const arm=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.1,0.5),armMat);
    arm.position.set(side*0.6,0.8,0);
    arm.rotation.z=side*0.3;
    arm.castShadow=true;
    g.add(arm);
  }
  
  g.position.set(0,0,5);
  return g;
}

// Create player
const player=makePlayer();
scene.add(player);

// Input
let tsX=0,tsY=0,swipe=false;
document.getElementById('gc').addEventListener('touchstart',function(e){
  e.preventDefault();
  const t=e.changedTouches[0];
  tsX=t.clientX;tsY=t.clientY;swipe=true;
},{passive:false});

document.getElementById('gc').addEventListener('touchmove',function(e){
  e.preventDefault();
  if(!swipe)return;
  const t=e.changedTouches[0],dx=t.clientX-tsX,dy=t.clientY-tsY;
  if(Math.abs(dx)>15||Math.abs(dy)>15){
    if(Math.abs(dx)>Math.abs(dy)){
      if(dx>0&&S.lane<2)S.laneTarget=++S.lane;
      else if(dx<0&&S.lane>0)S.laneTarget=--S.lane;
    }else if(dy<0&&!S.jump){
      S.jump=true;S.vy=S.jp;S.slide=false;
    }else if(dy>0&&!S.slide&&!S.jump){
      S.slide=true;S.slideT=20;
    }
    swipe=false;
  }
},{passive:false});
document.getElementById('gc').addEventListener('touchend',function(e){e.preventDefault();swipe=false},{passive:false});

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft'&&S.lane>0)S.laneTarget=--S.lane;
  else if(e.key==='ArrowRight'&&S.lane<2)S.laneTarget=++S.lane;
  else if((e.key==='ArrowUp'||e.key===' '||e.key==='w')&&!S.jump){
    e.preventDefault();S.jump=true;S.vy=S.jp;S.slide=false;
  }
  else if((e.key==='ArrowDown'||e.key==='s')&&!S.slide&&!S.jump)S.slide=true,S.slideT=20;
});

bl.addEventListener('touchstart',function(e){e.preventDefault();if(S.lane>0)S.laneTarget=--S.lane});
bl.addEventListener('mousedown',function(){if(S.lane>0)S.laneTarget=--S.lane});
br.addEventListener('touchstart',function(e){e.preventDefault();if(S.lane<2)S.laneTarget=++S.lane});
br.addEventListener('mousedown',function(){if(S.lane<2)S.laneTarget=++S.lane});
ab.addEventListener('touchstart',function(e){e.preventDefault();if(!S.jump){S.jump=true;S.vy=S.jp;S.slide=false}});
ab.addEventListener('mousedown',function(){if(!S.jump){S.jump=true;S.vy=S.jp;S.slide=false}});

pb.addEventListener('click',function(){
  reset();
  ov.classList.add('h');
});

rb.addEventListener('click',function(){
  goDiv.classList.add('h');
  reset();
});

function reset(){
  // Clean
  for(const o of S.obstacles) scene.remove(o.mesh);
  for(const c of S.coinMeshes) scene.remove(c);
  S.obstacles=[];
  S.coinMeshes=[];
  
  player.position.set(0,0,5);
  player.rotation.set(0,0,0);
  S.lane=1;
  S.laneTarget=1;
  S.jump=false;S.vy=0;S.slide=false;S.slideT=0;
  S.score=0;S.coins=0;S.z=0;S.frame=0;S.spd=8;S.shkX=0;S.shkZ=0;
  S.spawnZ=-20;
  S.nextSpawn=0;
  S.run=true;
  S.over=false;
  
  // Reposition camera
  camera.position.set(0,8,12);
  camera.lookAt(0,0,-8);
}

function spawnObstacle(){
  const lane=Math.floor(Math.random()*3);
  for(const o of S.obstacles) if(o.lane===lane&&o.z<S.z+10&&o.z>S.z-5) return;
  const type=Math.random()>0.5?0:1;
  const z=S.z-30-Math.random()*10;
  
  let mesh;
  if(type===0){
    // Car
    const car=new THREE.Group();
    const body=new THREE.Mesh(
      new THREE.BoxGeometry(0.8,0.3,1.2),
      new THREE.MeshStandardMaterial({color:Math.random()>0.5?0xff4444:0xff8844,roughness:0.4})
    );
    body.position.y=0.25;body.castShadow=true;
    car.add(body);
    const roof=new THREE.Mesh(
      new THREE.BoxGeometry(0.65,0.2,0.6),
      new THREE.MeshStandardMaterial({color:0x333344,roughness:0.5})
    );
    roof.position.set(0,0.5,0.1);roof.castShadow=true;
    car.add(roof);
    const wMat=new THREE.MeshStandardMaterial({color:0x88ccff});
    const w=new THREE.Mesh(new THREE.PlaneGeometry(0.5,0.15),wMat);
    w.position.set(0,0.4,0.45);
    car.add(w);
    // wheels
    const whMat=new THREE.MeshStandardMaterial({color:0x222222});
    for(let s of[-1,1]){
      for(let f of[-1,1]){
        const wh=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,0.05),whMat);
        wh.rotation.x=Math.PI/2;
        wh.position.set(s*0.35,0.1,f*0.4);
        car.add(wh);
      }
    }
    mesh=car;
    mesh.position.set(S.laneX[lane],0,z);
  }else{
    // Barrier
    mesh=new THREE.Mesh(
      new THREE.BoxGeometry(0.7,0.5,0.3),
      new THREE.MeshStandardMaterial({color:0xff8844,roughness:0.6})
    );
    mesh.position.set(S.laneX[lane],0.25,z);
    // stripes
    const stripe=new THREE.Mesh(
      new THREE.PlaneGeometry(0.6,0.1),
      new THREE.MeshStandardMaterial({color:0xffdd00,emissive:0xffdd00,emissiveIntensity:0.2})
    );
    for(let i=0;i<3;i++){
      const s=stripe.clone();
      s.position.set(S.laneX[lane],0.05+i*0.15,z+0.16);
      scene.add(s);
      S.coinMeshes.push(s);
    }
  }
  
  mesh.castShadow=true;
  scene.add(mesh);
  S.obstacles.push({lane,mesh,z,type,passed:false});
}

function spawnCoinRow(){
  const lane=Math.floor(Math.random()*3);
  const z=S.z-30-Math.random()*8;
  const coinGeo=new THREE.CylinderGeometry(0.15,0.15,0.03);
  const coinMat=new THREE.MeshStandardMaterial({
    color:0xffdd00,emissive:0xffdd00,emissiveIntensity:0.3,metalness:0.6,roughness:0.2
  });
  for(let i=0;i<3;i++){
    const c=new THREE.Mesh(coinGeo,coinMat);
    c.position.set(S.laneX[lane],0.8,z-i*2);
    c.rotation.x=Math.PI/2;
    c.userData={lane,collected:false};
    scene.add(c);
    S.coinMeshes.push(c);
  }
}

function checkCollisions(){
  const px=S.laneX[S.lane];
  const pz=5;
  const pw=0.6,ph=1.5;
  
  for(const o of S.obstacles){
    if(o.passed)continue;
    const ox=o.mesh.position.x,oz=o.mesh.position.z;
    const ow=0.7,oh=0.5,od=1.2;
    if(Math.abs(px-ox)<pw+ow && Math.abs(pz-oz)<ph+od){
      gameOver();
      return;
    }
    if(oz>pz+2&&!o.passed){o.passed=true;}
  }
  
  for(const c of S.coinMeshes){
    if(c.userData&&c.userData.collected)continue;
    if(Math.abs(S.laneX[S.lane]-c.position.x)<0.8 && Math.abs(5-c.position.z)<1.5){
      c.userData.collected=true;
      c.visible=false;
      S.coins++;
    }
  }
}

function gameOver(){
  S.over=true;S.run=false;
  if(S.score>S.highScore){S.highScore=S.score;localStorage.setItem('crH3d',''+S.highScore);}
  fs.textContent='Score: '+Math.floor(S.score/10);
  fc.textContent='⭐ '+S.coins+' coins';
  bs.textContent='Best: '+S.highScore;
  goDiv.classList.remove('h');
}

// ANIMATION LOOP
function anim(){
  requestAnimationFrame(anim);
  
  if(S.run){
    S.z-=S.spd*0.02;
    S.frame++;
    
    // Player lane movement
    const targetX=S.laneX[S.laneTarget];
    player.position.x+=(targetX-player.position.x)*0.15;
    
    // Player jump
    if(S.jump){
      S.vy+=S.grav*0.02;
      player.position.y+=S.vy;
      if(player.position.y<=0){
        player.position.y=0;
        S.jump=false;S.vy=0;
      }
    }
    
    // Player slide
    if(S.slide){
      S.slideT--;
      player.scale.y=0.5;
      player.position.y=-0.5;
      if(S.slideT<=0){S.slide=false;player.scale.y=1;player.position.y=0;}
    }
    
    // Camera follow
    const camTargetY=player.position.y>0?6+player.position.y*0.3:6;
    camera.position.y+=(camTargetY-camera.position.y)*0.05;
    camera.position.z+=0.01;
    
    // Bob
    if(!S.jump&&!S.slide){
      const bob=Math.sin(S.frame*0.15)*0.1;
      player.position.y+=bob*0.02;
      player.position.z=5+Math.sin(S.frame*0.1)*0.03;
    }
    
    // Spawn
    S.spawnZ-=S.spd*0.02;
    S.nextSpawn++;
    if(S.nextSpawn>30+Math.floor(Math.random()*20)){
      S.nextSpawn=0;
      spawnObstacle();
      if(Math.random()>0.4) spawnCoinRow();
    }
    
    // Move obstacles toward player
    for(const o of S.obstacles){
      o.z-=S.spd*0.02;
      o.mesh.position.z=o.z;
    }
    for(const c of S.coinMeshes){
      if(c.userData&&c.userData.collected)continue;
      c.position.z-=S.spd*0.02;
      c.rotation.z+=0.1;
    }
    
    // Remove far objects
    for(let i=S.obstacles.length-1;i>=0;i--){
      if(S.obstacles[i].z>10){
        scene.remove(S.obstacles[i].mesh);
        S.obstacles.splice(i,1);
      }
    }
    for(let i=S.coinMeshes.length-1;i>=0;i--){
      if(S.coinMeshes[i].position.z>10||S.coinMeshes[i].visible===false){
        scene.remove(S.coinMeshes[i]);
        S.coinMeshes.splice(i,1);
      }
    }
    
    // Check collision
    checkCollisions();
    
    // Score
    if(S.frame%3===0) S.score++;
    
    // Speed
    if(S.frame%200===0&&S.spd<18) S.spd+=0.3;
    
    // Shake
    if(S.shkX>0){S.shkX*=0.9;if(S.shkX<0.01)S.shkX=0;}
    if(S.shkZ>0){S.shkZ*=0.9;if(S.shkZ<0.01)S.shkZ=0;}
    
    // UI
    sd.textContent='🏃 '+Math.floor(S.score/10);
    cdE.textContent='⭐ '+S.coins;
  }
  
  // Camera shake
  let sx=0,sz=0;
  if(S.shkX>0){sx=(Math.random()-0.5)*S.shkX;sz=(Math.random()-0.5)*S.shkZ*0.5;}
  
  camera.lookAt(0+sx,0+sz,-8);
  renderer.render(scene,camera);
}

// Start
S.highScore=+localStorage.getItem('crH3d')||0;
anim();
})();
</script>
