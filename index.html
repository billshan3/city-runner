<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>City Runner 🏃‍♂️</title>
<style>
body{margin:0;background:#111;display:flex;justify-content:center;align-items:center;min-height:100dvh;overflow:hidden;font-family:sans-serif}
#gc{position:relative;width:100%;max-width:500px;aspect-ratio:400/700;background:#1a1a2e;border-radius:12px;overflow:hidden}
#gcv{width:100%;height:100%;display:block}
#ui{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none}
#sd{position:absolute;top:10px;left:15px;color:#fff;font-size:20px;font-weight:bold;text-shadow:0 2px 4px #0008}
#cd{position:absolute;top:10px;right:15px;color:#ffdd00;font-size:20px;font-weight:bold;text-shadow:0 2px 4px #0008}
#ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000b;color:#fff;text-align:center;padding:20px;pointer-events:auto}
#ov h1{font-size:40px;color:#ffdd00;margin:0 0 10px}
#ov p{margin:5px 0;opacity:.8;font-size:16px}
#ov button{margin-top:20px;padding:15px 60px;font-size:24px;border:none;border-radius:30px;background:#ffdd00;color:#111;font-weight:bold;pointer-events:auto;touch-action:manipulation;cursor:pointer}
#ov button:active{transform:scale(.95)}
#go{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000b;color:#fff;text-align:center;padding:20px;pointer-events:auto}
#go h1{font-size:38px;color:#f44;margin:0 0 10px}
#go .sf{font-size:24px;margin:3px 0}
#go button{margin-top:20px;padding:15px 60px;font-size:24px;border:none;border-radius:30px;background:#ffdd00;color:#111;font-weight:bold;pointer-events:auto;touch-action:manipulation;cursor:pointer}
.h{display:none!important}
#btns{position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:space-between;padding:0 10px;pointer-events:none}
#btns button{pointer-events:auto;width:65px;height:65px;border-radius:50%;border:2px solid #fff5;background:#fff2;color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;touch-action:manipulation;-webkit-tap-highlight-color:transparent;cursor:pointer}
#btns button:active{background:#fff5}
#ab{width:75px;height:75px;font-size:20px;background:rgba(255,200,50,0.2);border-color:rgba(255,200,50,0.5)!important}
</style>
</head>
<body>
<div id="gc">
<canvas id="gcv"></canvas>
<div id="ui">
<div id="sd">🏃 0</div><div id="cd">⭐ 0</div>
</div>
<div id="ov"><h1>🚇 City Runner</h1><p>Dodge obstacles • Collect coins</p><p style="font-size:16px;margin-top:10px">Like Subway Surfers!</p><button id="pb">▶ PLAY</button><p style="font-size:13px;margin-top:15px;opacity:.6">Swipe L/R to switch lanes<br>Swipe up=Jump • down=Slide</p></div>
<div id="go" class="h"><h1>💥 GAME OVER</h1><p class="sf" id="fs">Score: 0</p><p class="sf" style="color:#ffdd00" id="fc">⭐ 0 coins</p><p style="opacity:.6;font-size:16px" id="bs">Best: 0</p><button id="rb2">↻ Again</button></div>
<div id="btns"><button id="bl2">◀</button><button id="ab2">JUMP</button><button id="br2">▶</button></div>
</div>
<script>
(function(){
"use strict";

const c=document.getElementById('gcv'), x=c.getContext('2d');
c.width=400; c.height=700;
const W=400, H=700, G=580;
const LV=[W/6, W/2, 5*W/6];
const PW=36, PH=50;

// Get DOM elements
const ov=document.getElementById('ov');
const goDiv=document.getElementById('go');
const pb=document.getElementById('pb');
const rb2=document.getElementById('rb2');
const bl2=document.getElementById('bl2');
const br2=document.getElementById('br2');
const ab2=document.getElementById('ab2');
const sd=document.getElementById('sd');
const cdE=document.getElementById('cd');
const fs=document.getElementById('fs');
const fc=document.getElementById('fc');
const bs=document.getElementById('bs');

// polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(typeof r==='number') r=[r];
    const rd=r.map(v=>Math.min(v,Math.min(w,h)/2));
    const tl=rd[0]||0, tr=rd[1]||tl, br=rd[2]||tl, bl=rd[3]||tl;
    this.moveTo(x+tl,y); this.lineTo(x+w-tr,y);
    this.quadraticCurveTo(x+w,y,x+w,y+tr);
    this.lineTo(x+w,y+h-br);
    this.quadraticCurveTo(x+w,y+h,x+w-br,y+h);
    this.lineTo(x+bl,y+h);
    this.quadraticCurveTo(x,y+h,x,y+h-bl);
    this.lineTo(x,y+tl);
    this.quadraticCurveTo(x,y,x+tl,y); this.closePath();
  };
}

// STATE
let S={
  score:0, coins:0, highScore:0, spd:4, mxSpd:12, f:0, run:false, over:false,
  ln:1, px:LV[1]-PW/2, py:G-PH, tx:LV[1]-PW/2,
  jump:false, vy:0, grav:.55, jp:-10,
  slide:false, st:0, sd:18, anim:0, animT:0,
  obs:[], coinsA:[], rl:[], pts:[], bd:[], stars:[], stm:0, cst:0, dt:0, shk:0, combo:0
};

function reset(){
  S={score:0, coins:0, highScore:S.highScore, spd:4, mxSpd:12, f:0, run:false, over:false,
    ln:1, px:LV[1]-PW/2, py:G-PH, tx:LV[1]-PW/2,
    jump:false, vy:0, grav:.55, jp:-10,
    slide:false, st:0, sd:18, anim:0, animT:0,
    obs:[], coinsA:[], rl:[], pts:[], bd:[], stars:[], stm:0, cst:0, dt:0, shk:0, combo:0};
  // road lines
  for(let i=0;i<20;i++) S.rl.push({y:-30+i*38});
  // buildings
  const bc=[
    {x:0,w:50,h:160,c:'#2a2a4a'},{x:55,w:40,h:100,c:'#35355a'},
    {x:100,w:60,h:180,c:'#252545'},{x:165,w:45,h:130,c:'#303055'},
    {x:215,w:55,h:150,c:'#282848'},{x:275,w:40,h:170,c:'#333358'},
    {x:320,w:50,h:110,c:'#2d2d50'},{x:0,w:65,h:90,c:'#383860'},
    {x:70,w:35,h:140,c:'#2c2c4c'},{x:110,w:55,h:195,c:'#262646'},
    {x:170,w:50,h:120,c:'#323255'},{x:225,w:45,h:160,c:'#2b2b4b'},
    {x:275,w:55,h:140,c:'#343458'},{x:335,w:60,h:100,c:'#2e2e52'}];
  S.bd=bc.map(b=>{
    const w=[]; let o=0;
    for(let wx=b.x+8;wx<b.x+b.w-8;wx+=22)
      for(let wy=H-150-b.h+15;wy<H-100;wy+=28)
        if(Math.random()>.3) w.push({x:wx,y:wy});
    return {b,w,o};
  });
  // stars
  S.stars=[];
  for(let i=0;i<35;i++) S.stars.push({
    x:Math.random()*W, y:Math.random()*(G-150),
    r:.5+Math.random(), b:100+155*Math.random(),
    s:.02+.03*Math.random(), ph:6.28*Math.random()
  });
}

// PLAYER
function moveLeft(){if(S.ln>0){S.ln--;S.tx=LV[S.ln]-PW/2}}
function moveRight(){if(S.ln<2){S.ln++;S.tx=LV[S.ln]-PW/2}}
function doJump(){if(!S.jump){S.jump=true;S.vy=S.jp;S.slide=false}}
function doSlide(){if(!S.slide&&!S.jump){S.slide=true;S.st=S.sd}}
function pRect(){return S.slide?{x:S.px,y:G-PH/2,w:PW,h:PH/2}:{x:S.px,y:S.py,w:PW,h:PH}}
function updateP(){
  const d=S.tx-S.px;
  S.px+=Math.abs(d)>1?d*.18:0;
  if(Math.abs(d)<=1) S.px=S.tx;
  if(S.jump){S.py+=S.vy;S.vy+=S.grav;if(S.py>=G-PH){S.py=G-PH;S.jump=false;S.vy=0}}
  if(S.slide&&--S.st<=0)S.slide=false;
  if(++S.animT>7){S.animT=0;S.anim=(S.anim+1)%4}
}

// SPAWN
function spawnO(){
  const ln=Math.floor(Math.random()*3);
  for(const o of S.obs) if(o.ln===ln&&o.y<150) return;
  const tp=[0,0,1,1,2][Math.floor(Math.random()*5)];
  S.obs.push({ln,x:LV[ln]-(PW+8)/2,y:-80,tp,w:PW+8,h:tp===1?35:45,cl:['#f44','#f84','#f33'][tp],ps:false});
}
function spawnC(){
  S.coinsA.push({ln:Math.floor(Math.random()*3),x:LV[Math.floor(Math.random()*3)],y:-20,r:8,col:false,an:0});
}
function ovlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}
function doOver(){
  S.over=true; S.shk=10;
  if(S.score>S.highScore){S.highScore=S.score;localStorage.setItem('crH',''+S.highScore)}
  for(let i=25;i--;) S.pts.push({
    x:S.px+PW/2,y:S.py+PH/2,
    vx:Math.random()*10-5,vy:Math.random()*8-6,
    lf:20+Math.random()*25,ml:45,sz:2+Math.random()*4,
    cl:['#f44','#f84','#fd0','#fff'][Math.floor(Math.random()*4)]
  });
  fs.textContent='Score: '+S.score;
  fc.textContent='⭐ '+S.coins+' coins';
  bs.textContent='Best: '+S.highScore;
  goDiv.classList.remove('h');
}

// UPDATE
function upd(){
  if(!S.run&&!S.over) return;
  if(S.over){updPts();return}
  if(++S.dt%200===0&&S.spd<S.mxSpd) S.spd+=0.25;
  if(++S.stm>=Math.max(35,80-S.spd*3)){S.stm=0;spawnO()}
  if(++S.cst>=10+Math.random()*25){S.cst=0;spawnC()}
  S.score++;
  updateP();
  // obstacles
  for(let i=S.obs.length-1;i>=0;i--){
    const o=S.obs[i]; o.y+=S.spd;
    if(o.y>H+50){S.obs.splice(i,1);continue}
    if(!o.ps&&o.y>G){o.ps=true;S.combo=0}
    if(!o.ps&&ovlap(o,pRect())){doOver();return}
  }
  // coins
  for(let i=S.coinsA.length-1;i>=0;i--){
    const c=S.coinsA[i]; c.y+=S.spd; c.an=(c.an+1)%30;
    if(c.y>H+20){S.coinsA.splice(i,1);continue}
    if(!c.col&&Math.hypot(c.x-(S.px+PW/2),c.y-(S.py+PH/2))<25){
      c.col=true; S.coins++;
      for(let j=10;j--;) S.pts.push({x:c.x,y:c.y,vx:Math.random()*6-3,vy:Math.random()*3.5-4,lf:15+Math.random()*15,ml:30,sz:2+Math.random()*3,cl:'#fd0'});
      S.combo++; if(S.combo>1) S.score+=S.combo*2;
      S.coinsA.splice(i,1);
    }
  }
  // road lines
  for(let i=S.rl.length-1;i>=0;i--){S.rl[i].y+=S.spd;if(S.rl[i].y>H+10){S.rl.splice(i,1);S.rl.push({y:-30})}}
  // particles
  updPts();
  if(S.shk>0) S.shk--;
}
function updPts(){
  for(let i=S.pts.length-1;i>=0;i--){const p=S.pts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;if(--p.lf<=0)S.pts.splice(i,1)}
}

// DRAW
function drawP(){
  const cx=S.px+PW/2;
  if(S.slide){
    const sy=G-PH/2;
    x.fillStyle='#48f';x.beginPath();x.roundRect(S.px,sy,PW,PH/2,5);x.fill();
    x.beginPath();x.arc(cx,sy+8,9,0,7);x.fill();
    x.fillStyle='#fff';x.beginPath();x.arc(cx-4,sy+6,3,0,7);x.arc(cx+4,sy+6,3,0,7);x.fill();
    x.fillStyle='#222';x.beginPath();x.arc(cx-3,sy+6,1.5,0,7);x.arc(cx+5,sy+6,1.5,0,7);x.fill();
  }else if(S.jump){
    x.fillStyle='#48f';x.beginPath();x.roundRect(S.px,S.py,PW,PH,5);x.fill();
    x.beginPath();x.arc(cx,S.py-5,9,0,7);x.fill();
    x.fillStyle='#fff';x.beginPath();x.arc(cx-5,S.py-7,3,0,7);x.arc(cx+5,S.py-7,3,0,7);x.fill();
    x.fillStyle='#222';x.beginPath();x.arc(cx-4,S.py-7,1.5,0,7);x.arc(cx+6,S.py-7,1.5,0,7);x.fill();
    x.strokeStyle='#48f';x.lineWidth=4;x.lineCap='round';
    x.beginPath();x.moveTo(S.px+6,S.py+8);x.lineTo(S.px-6,S.py-12);x.stroke();
    x.beginPath();x.moveTo(S.px+PW-6,S.py+8);x.lineTo(S.px+PW+6,S.py-12);x.stroke();
    x.beginPath();x.moveTo(S.px+10,G);x.lineTo(S.px+8,S.py+PH-2);x.stroke();
    x.beginPath();x.moveTo(S.px+PW-10,G);x.lineTo(S.px+PW-8,S.py+PH-2);x.stroke();
  }else{
    x.fillStyle='#48f';x.beginPath();x.roundRect(S.px,S.py,PW,PH,5);x.fill();
    x.beginPath();x.arc(cx,S.py-5,9,0,7);x.fill();
    x.fillStyle='#fff';x.beginPath();x.arc(cx-5,S.py-7,3,0,7);x.arc(cx+5,S.py-7,3,0,7);x.fill();
    x.fillStyle='#222';x.beginPath();x.arc(cx-4,S.py-7,1.5,0,7);x.arc(cx+6,S.py-7,1.5,0,7);x.fill();
    x.fillStyle='#f84';x.beginPath();x.arc(cx,S.py-10,10,Math.PI,0);x.fill();
    const lo=Math.sin(S.anim*Math.PI/2)*6;
    x.strokeStyle='#48f';x.lineWidth=5;x.lineCap='round';
    x.beginPath();x.moveTo(S.px+10,S.py+PH-5);x.lineTo(S.px+10+lo,G);x.stroke();
    x.beginPath();x.moveTo(S.px+PW-10,S.py+PH-5);x.lineTo(S.px+PW-10-lo,G);x.stroke();
    x.lineWidth=4;
    x.beginPath();x.moveTo(S.px+5,S.py+12);x.lineTo(S.px-2-lo*.5,S.py+20);x.stroke();
    x.beginPath();x.moveTo(S.px+PW-5,S.py+12);x.lineTo(S.px+PW+2+lo*.5,S.py+20);x.stroke();
  }
}
function drawBg(){
  const gr=x.createLinearGradient(0,0,0,G);
  gr.addColorStop(0,'#0a0a2e');gr.addColorStop(.5,'#1a1a3e');gr.addColorStop(1,'#2a2a4e');
  x.fillStyle=gr;x.fillRect(0,0,W,G);
  const t=S.f*0.02;
  for(const s of S.stars){const b=Math.floor(s.b*(.5+.5*Math.sin(t*s.s+s.ph)));x.fillStyle='rgb('+b+','+b+','+(b+20)+')';x.beginPath();x.arc(s.x,s.y,s.r,0,7);x.fill()}
  x.fillStyle='#151530';
  for(let xx=0;xx<W+50;xx+=30+Math.sin(xx)*10){const sh=80+Math.sin(xx*.1)*40+Math.cos(xx*.05)*20;x.fillRect(xx+5,G-sh-80,25,sh+80);x.fillStyle='rgba(255,200,100,.15)';for(let wy=G-sh-60;wy<G-100;wy+=15)if(Math.sin(xx+wy)>.2)x.fillRect(xx+8,wy,4,4);x.fillStyle='#151530'}
  const sf=S.spd*0.3;
  for(const b of S.bd){b.o=(b.o+sf)%(W+200);const dx=((b.b.x-b.o)%(W+200)+(W+200))%(W+200)-100;x.fillStyle=b.b.c;x.fillRect(dx,G-b.b.h,b.b.w,b.b.h);x.strokeStyle='rgba(255,255,255,.08)';x.lineWidth=1;x.strokeRect(dx,G-b.b.h,b.b.w,b.b.h);for(const w of b.w){x.fillStyle=Math.sin(w.x*.1+w.y*.05+t)>.1?'rgba(255,200,100,.6)':'rgba(100,100,120,.3)';x.fillRect(w.x+b.o,w.y+b.o,6,10)}}
  const gg=x.createLinearGradient(0,G,0,H);
  gg.addColorStop(0,'#3a3a4a');gg.addColorStop(.3,'#333345');gg.addColorStop(1,'#2a2a3a');
  x.fillStyle=gg;x.fillRect(0,G,W,H-G);
  x.strokeStyle='#555570';x.lineWidth=2;x.beginPath();x.moveTo(0,G);x.lineTo(W,G);x.stroke();
  x.strokeStyle='rgba(255,255,255,.15)';x.lineWidth=1;for(let i=1;i<3;i++){x.beginPath();x.moveTo(i*W/3,G);x.lineTo(i*W/3,H);x.stroke()}
  x.strokeStyle='rgba(255,255,255,.5)';x.lineWidth=3;x.setLineDash([18,14]);
  for(let i=0;i<3;i++){x.beginPath();x.moveTo(i*W/3+W/6,0);x.lineTo(i*W/3+W/6,H);x.stroke()}x.setLineDash([]);
  x.fillStyle='rgba(255,255,255,.6)';for(const l of S.rl)for(let i=0;i<3;i++)x.fillRect(i*W/3+W/6-2,l.y,4,20);
}
function drawObs(){
  for(const o of S.obs){
    if(o.tp===0){
      x.fillStyle=o.cl;x.beginPath();x.roundRect(o.x,o.y,o.w,o.h,4);x.fill();
      x.fillStyle='#333';x.beginPath();x.roundRect(o.x+4,o.y-2,o.w-8,8,3);x.fill();
      x.fillStyle='#8cf';x.fillRect(o.x+5,o.y+8,o.w-10,10);
      x.fillStyle='#222';x.beginPath();x.arc(o.x+8,o.y+o.h,5,0,7);x.arc(o.x+o.w-8,o.y+o.h,5,0,7);x.fill();
      x.fillStyle='#ffa';x.fillRect(o.x+o.w-3,o.y+5,3,6);x.fillRect(o.x+o.w-3,o.y+o.h-10,3,6);
    }else if(o.tp===1){
      x.fillStyle=o.cl;x.beginPath();x.roundRect(o.x,o.y,o.w,o.h,3);x.fill();
      x.strokeStyle='#fd0';x.lineWidth=3;for(let j=0;j<3;j++){x.beginPath();x.moveTo(o.x+4,o.y+5+j*12);x.lineTo(o.x+o.w-4,o.y+5+j*12);x.stroke()}
    }else{
      x.fillStyle='rgba(255,0,0,.4)';x.beginPath();x.roundRect(o.x,o.y,o.w,o.h/2,3);x.fill();
      x.fillStyle='rgba(255,0,0,.2)';x.beginPath();x.roundRect(o.x-5,o.y+o.h/2-5,o.w+10,10,3);x.fill()
    }
  }
  for(const c of S.coinsA){
    if(c.col)continue;
    const sc=Math.abs(Math.cos(c.an*Math.PI/15)),ew=Math.max(4,c.r*2*sc);
    const gr2=x.createRadialGradient(c.x,c.y,0,c.x,c.y,c.r*2);
    gr2.addColorStop(0,'rgba(255,215,0,.3)');gr2.addColorStop(1,'rgba(255,215,0,0)');
    x.fillStyle=gr2;x.beginPath();x.arc(c.x,c.y,c.r*2,0,7);x.fill();
    x.fillStyle='#fd0';x.beginPath();x.ellipse(c.x,c.y,ew/2,c.r,0,0,7);x.fill();
    x.strokeStyle='#c90';x.lineWidth=2;x.beginPath();x.ellipse(c.x,c.y,ew/2,c.r,0,0,7);x.stroke();
    if(sc>.5){x.fillStyle='#fa0';x.font=(c.r+2)+'px sans-serif';x.textAlign='center';x.textBaseline='middle';x.fillText('⭐',c.x,c.y)}
  }
}
function drawPts(){
  for(const p of S.pts){x.globalAlpha=p.lf/p.ml;x.fillStyle=p.cl||'#aaa';x.beginPath();x.arc(p.x,p.y,Math.max(1,p.sz*p.lf/p.ml),0,7);x.fill()}
  x.globalAlpha=1;
}

function draw(){
  x.clearRect(0,0,W,H);
  if(S.shk>0){x.save();x.translate(Math.random()*8-4,Math.random()*6-3)}
  drawBg();
  if(!S.over) drawP();
  drawObs();
  drawPts();
  if(S.shk>0) x.restore();
  sd.textContent='🏃 '+S.score;
  cdE.textContent='⭐ '+S.coins;
}

// GAME LOOP
function loop(){upd();draw();requestAnimationFrame(loop)}

// INPUT
let tx=0,ty=0,sw=0;
c.addEventListener('touchstart',function(e){e.preventDefault();var t=e.changedTouches[0];tx=t.clientX;ty=t.clientY;sw=1},{passive:false});
c.addEventListener('touchmove',function(e){e.preventDefault();if(!sw)return;var t=e.changedTouches[0],dx=t.clientX-tx,dy=t.clientY-ty;if(Math.abs(dx)>20||Math.abs(dy)>20){if(Math.abs(dx)>Math.abs(dy)){if(dx>0)moveRight();else moveLeft()}else{if(dy<0)doJump();else doSlide()}sw=0}},{passive:false});
c.addEventListener('touchend',function(e){e.preventDefault();sw=0},{passive:false});
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A')moveLeft();
  else if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')moveRight();
  else if(e.key==='ArrowUp'||e.key==='w'||e.key==='W'||e.key===' '){e.preventDefault();doJump()}
  else if(e.key==='ArrowDown'||e.key==='s'||e.key==='S')doSlide();
});

// BUTTONS
bl2.addEventListener('touchstart',function(e){e.preventDefault();moveLeft()});
bl2.addEventListener('mousedown',moveLeft);
br2.addEventListener('touchstart',function(e){e.preventDefault();moveRight()});
br2.addEventListener('mousedown',moveRight);
ab2.addEventListener('touchstart',function(e){e.preventDefault();doJump()});
ab2.addEventListener('mousedown',doJump);

// START BUTTON
pb.addEventListener('click',function(){
  reset();
  S.run=true;
  ov.classList.add('h');
});

// RESTART BUTTON
rb2.addEventListener('click',function(){
  goDiv.classList.add('h');
  reset();
  S.run=true;
});

// INIT
reset();
S.highScore = +localStorage.getItem('crH')||0;
loop();
})();
</script>
</body>
