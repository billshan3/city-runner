<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>City Runner 3D 🏃</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:none;font-family:Arial,sans-serif}
#gc{width:100vw;height:100dvh;display:block}
#sd{position:fixed;top:12px;left:15px;color:#fff;font-size:20px;font-weight:bold;text-shadow:0 2px 6px #000;pointer-events:none}
#cd{position:fixed;top:12px;right:15px;color:#ffdd00;font-size:20px;font-weight:bold;text-shadow:0 2px 6px #000;pointer-events:none}
#ov{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000c;color:#fff;text-align:center;padding:20px;pointer-events:auto;z-index:10}
#ov h1{font-size:44px;color:#ffdd00;margin-bottom:8px;text-shadow:0 0 30px #ffdd0055}
#ov p{margin:3px 0;opacity:.8;font-size:15px}
#ov button{margin-top:16px;padding:14px 60px;font-size:24px;border:none;border-radius:28px;background:linear-gradient(135deg,#ffdd00,#ff9900);color:#111;font-weight:bold;pointer-events:auto;cursor:pointer;box-shadow:0 4px 20px #ffdd0066}
#ov button:active{transform:scale(.95)}
#go{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000c;color:#fff;text-align:center;padding:20px;pointer-events:auto;z-index:10}
#go h1{font-size:40px;color:#f44;margin-bottom:8px}
#go .sf{font-size:22px;margin:2px 0}
#go button{margin-top:16px;padding:14px 60px;font-size:24px;border:none;border-radius:28px;background:linear-gradient(135deg,#ffdd00,#ff9900);color:#111;font-weight:bold;pointer-events:auto;cursor:pointer;box-shadow:0 4px 20px #ffdd0066}
#go button:active{transform:scale(.95)}
#btns{position:fixed;bottom:12px;left:0;right:0;display:flex;justify-content:space-between;padding:0 12px;pointer-events:none;z-index:5}
#btns button{pointer-events:auto;width:64px;height:64px;border-radius:50%;border:2px solid #fff3;background:#fff1;color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
#btns button:active{background:#fff4}
#ab2{width:74px;height:74px;background:rgba(255,200,50,.15);border-color:rgba(255,200,50,.4)!important;font-size:16px}
.h{display:none!important}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<div id="sd">🏃 0</div><div id="cd">⭐ 0</div>
<div id="ov"><h1>🚇 City Runner 3D</h1><p>Dodge cars • Collect coins</p><p style="font-size:15px;margin-top:6px">3D endless runner</p><button id="pb">▶ PLAY</button><p style="font-size:12px;margin-top:12px;opacity:.5">Swipe to dodge • Tap top to jump</p></div>
<div id="go" class="h"><h1>💥 GAME OVER</h1><p class="sf" id="fs">Score: 0</p><p class="sf" style="color:#ffdd00" id="fc">⭐ 0 coins</p><p style="opacity:.6;font-size:15px" id="bs">Best: 0</p><button id="rb">↻ Play Again</button></div>
<div id="btns"><button id="bl2">◀</button><button id="ab2">JUMP</button><button id="br2">▶</button></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
"use strict";

// ===== DOM =====
const ov=document.getElementById('ov'), goDiv=document.getElementById('go');
const pb=document.getElementById('pb'), rb2=document.getElementById('rb');
const bl2=document.getElementById('bl2'), br2=document.getElementById('br2'), ab2=document.getElementById('ab2');
const sd=document.getElementById('sd'), cdE=document.getElementById('cd');
const fs=document.getElementById('fs'), fc=document.getElementById('fc'), bs=document.getElementById('bs');

// ===== THREE.JS =====
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('gc'),antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1;

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0a0a1e);
scene.fog=new THREE.FogExp2(0x0a0a1e,0.015);

const W=innerWidth,H=innerHeight;
const camera=new THREE.PerspectiveCamera(65,W/H,0.1,120);
camera.position.set(0,6,10);
camera.lookAt(0,0,-5);

renderer.setSize(W,H);

// ===== LIGHTS =====
scene.add(new THREE.AmbientLight(0x4466aa,0.4));
const moon=new THREE.DirectionalLight(0xaaaaff,1.2);
moon.position.set(-5,15,10);
moon.castShadow=true;
moon.shadow.mapSize.set(1024,1024);
moon.shadow.camera.near=0.5;moon.shadow.camera.far=50;
moon.shadow.camera.left=-15;moon.shadow.camera.right=15;
moon.shadow.camera.top=15;moon.shadow.camera.bottom=-15;
scene.add(moon);
scene.add(new THREE.DirectionalLight(0xff8844,0.3).position.set(10,5,-10));

// ===== STARS =====
const sg=new THREE.BufferGeometry();
const sp=new Float32Array(900);
for(let i=0;i<900;i+=3){sp[i]=(Math.random()-.5)*200;sp[i+1]=Math.random()*60+5;sp[i+2]=-Math.random()*200-20;}
sg.setAttribute('position',new THREE.BufferAttribute(sp,3));
scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:0.2})));

// ===== GROUND =====
const gm=new THREE.MeshStandardMaterial({color:0x2a2a3a,roughness:.9});
const ground=new THREE.Mesh(new THREE.PlaneGeometry(20,200),gm);
ground.rotation.x=-Math.PI/2;ground.position.set(0,0,-60);ground.receiveShadow=true;
scene.add(ground);

// Lane markers
const lm=new THREE.MeshStandardMaterial({color:0x444460,roughness:.8});
for(let i=0;i<3;i++){
  const lane=new THREE.Mesh(new THREE.PlaneGeometry(6,200),lm);
  lane.rotation.x=-Math.PI/2;lane.position.set(-6+i*6,0.01,-60);
  scene.add(lane);
}
// Dashed lines
const dashMat=new THREE.MeshStandardMaterial({color:0x8888aa,emissive:0x444466,emissiveIntensity:.3});
for(let i=0;i<3;i++){
  const cx=-6+i*6;
  for(let z=-5;z>-60;z-=2.5){
    const d=new THREE.Mesh(new THREE.PlaneGeometry(0.15,0.8),dashMat);
    d.rotation.x=-Math.PI/2;d.position.set(cx,0.02,z);
    scene.add(d);
  }
}

// ===== BUILDINGS =====
const bcolors=[0x252545,0x2a2a4a,0x303055,0x282848,0x333358,0x2d2d50,0x383860];
for(let z=-8;z>-85;z-=5+Math.random()*3){
  const side=Math.random()>.5?1:-1;
  const x=(7+Math.random()*4)*side;
  const w=1.5+Math.random()*3,h=3+Math.random()*8,d=2+Math.random()*3;
  const b=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshStandardMaterial({color:bcolors[Math.floor(Math.random()*bcolors.length)],roughness:.7}));
  b.position.set(x,h/2,z);b.castShadow=true;b.receiveShadow=true;
  scene.add(b);
  // Windows
  const wm=new THREE.MeshStandardMaterial({color:0xffdd88,emissive:0xffdd88,emissiveIntensity:.2+Math.random()*.3});
  for(let wy=1;wy<h-1;wy+=1.3){for(let wx=-w/2+.4;wx<w/2-.3;wx+=1.1){if(Math.random()>.3){
    const win=new THREE.Mesh(new THREE.PlaneGeometry(0.3,0.5),wm);
    win.position.set(x+wx,wy,z+d/2+.01);scene.add(win);
  }}}
  // Opposite side
  if(Math.random()>.4){
    const x2=-(7+Math.random()*4)*side;
    const b2=new THREE.Mesh(new THREE.BoxGeometry(w*.8,h*.7+Math.random()*3,d*.8),new THREE.MeshStandardMaterial({color:bcolors[Math.floor(Math.random()*bcolors.length)],roughness:.7}));
    b2.position.set(x2,h/2*.7,z-2);b2.castShadow=true;scene.add(b2);
  }
}

// ===== PLAYER =====
function makePlayer(){
  const g=new THREE.Group();
  const bm=new THREE.MeshStandardMaterial({color:0x4488ff,roughness:.3});
  const body=new THREE.Mesh(new THREE.BoxGeometry(.8,1.2,.5),bm);
  body.position.y=.6;body.castShadow=true;g.add(body);
  
  const hm=new THREE.MeshStandardMaterial({color:0xffccaa,roughness:.4});
  const head=new THREE.Mesh(new THREE.SphereGeometry(.35,8,8),hm);
  head.position.set(0,1.6,.1);head.castShadow=true;g.add(head);
  
  const hair=new THREE.Mesh(new THREE.SphereGeometry(.38,8,8,0,Math.PI*2,0,Math.PI/2),new THREE.MeshStandardMaterial({color:0xff8844,roughness:.8}));
  hair.position.set(0,1.78,.1);g.add(hair);
  
  const lm2=new THREE.MeshStandardMaterial({color:0x3366cc});
  for(let s of[-.12,.12]){const l=new THREE.Mesh(new THREE.CylinderGeometry(.08,.1,.35),lm2);l.position.set(s,-.15,0);g.add(l);}
  const am=new THREE.MeshStandardMaterial({color:0x4488ff,roughness:.3});
  for(let s of[-1,1]){const a=new THREE.Mesh(new THREE.CylinderGeometry(.06,.08,.4),am);a.position.set(s*.55,.7,0);a.rotation.z=s*.3;g.add(a);}
  
  g.position.set(0,0,4);
  return g;
}
const player=makePlayer();
scene.add(player);

// ===== STATE =====
let S={};
function reset(){
  // Clean old obstacles
  if(S.obs)for(const o of S.obs)scene.remove(o);
  if(S.coins)for(const c of S.coins)scene.remove(c);
  
  player.position.set(0,0,4);
  player.rotation.set(0,0,0);
  
  S={run:false,over:false,score:0,coins:0,hs:S&&S.hs||+localStorage.getItem('crH3d')||0,spd:12,
    lane:1,targetLane:1,lx:[-6,0,6],jump:false,vy:0,grav:.35,jp:-.22,slide:false,st:0,
    obs:[],coins:[],frame:0,spawnZ:-15,stm:0,cst:0};
  
  camera.position.set(0,6,10);
  camera.lookAt(0,0,-5);
}

// ===== SPAWNING =====
function spawnObs(){
  const lane=Math.floor(Math.random()*3);
  for(const o of S.obs)if(o.lane===lane&&o.z<0&&o.z>-15)return;
  const type=Math.random()>.5?0:1;
  const z=S.spawnZ-Math.random()*10;
  
  let mesh;
  if(type===0){
    const g=new THREE.Group();
    g.add(new THREE.Mesh(new THREE.BoxGeometry(.8,.3,1.2),new THREE.MeshStandardMaterial({color:Math.random()>.5?0xff4444:0xff8844,roughness:.4})));
    g.children[0].position.y=.25;g.children[0].castShadow=true;
    g.add(new THREE.Mesh(new THREE.BoxGeometry(.6,.2,.6),new THREE.MeshStandardMaterial({color:0x333344,roughness:.5})));
    g.children[1].position.set(0,.5,.1);g.children[1].castShadow=true;
    const wm2=new THREE.MeshStandardMaterial({color:0x88ccff});
    const w=new THREE.Mesh(new THREE.PlaneGeometry(.4,.12),wm2);
    w.position.set(0,.4,.45);g.add(w);
    for(let s of[-1,1])for(let f of[-1,1]){const wh=new THREE.Mesh(new THREE.CylinderGeometry(.1,.1,.04),new THREE.MeshStandardMaterial({color:0x222}));wh.rotation.x=Math.PI/2;wh.position.set(s*.3,.1,f*.35);g.add(wh);}
    mesh=g;
  }else{
    mesh=new THREE.Mesh(new THREE.BoxGeometry(.7,.5,.3),new THREE.MeshStandardMaterial({color:0xff8844,roughness:.6}));
    for(let i=0;i<3;i++){const s=new THREE.Mesh(new THREE.PlaneGeometry(.55,.08),new THREE.MeshStandardMaterial({color:0xffdd00,emissive:0xffdd00,emissiveIntensity:.2}));s.position.set(0,.05+i*.15,.16);mesh.add(s);}
  }
  mesh.position.set(S.lx[lane],0,z);mesh.castShadow=true;
  scene.add(mesh);
  S.obs.push({mesh,lane,z,type,passed:false,dz:z});
}

function spawnCoin(){
  const lane=Math.floor(Math.random()*3);
  const z=S.spawnZ-Math.random()*10;
  const cm=new THREE.MeshStandardMaterial({color:0xffdd00,emissive:0xffdd00,emissiveIntensity:.4,metalness:.6,roughness:.2});
  for(let i=0;i<3;i++){
    const c=new THREE.Mesh(new THREE.CylinderGeometry(.12,.12,.03),cm);
    c.position.set(S.lx[lane],.6,z-i*1.5);c.rotation.x=Math.PI/2;
    c.userData={collected:false};
    scene.add(c);S.coins.push(c);
  }
}

function checkCollisions(){
  const px=S.lx[S.lane],pz=4;
  for(const o of S.obs){
    if(o.passed)continue;
    if(Math.abs(px-o.mesh.position.x)<.7&&Math.abs(pz-o.mesh.position.z)<1.2){gameOver();return}
    if(o.mesh.position.z>pz+2)o.passed=true;
  }
  for(const c of S.coins){
    if(!c.userData||c.userData.collected||!c.visible)continue;
    if(Math.abs(px-c.position.x)<.7&&Math.abs(pz-c.position.z)<1.5){c.userData.collected=true;c.visible=false;S.coins++;}
  }
}

function gameOver(){
  S.over=true;S.run=false;
  S.score=S.score;const s=Math.floor(S.score/10);
  if(s>S.hs){S.hs=s;localStorage.setItem('crH3d',''+S.hs);}
  fs.textContent='Score: '+s;
  fc.textContent='⭐ '+S.coins+' coins';
  bs.textContent='Best: '+S.hs;
  goDiv.classList.remove('h');
}

// ===== INPUT =====
let tx=0,ty=0,sw=0;
document.getElementById('gc').addEventListener('touchstart',function(e){e.preventDefault();const t=e.changedTouches[0];tx=t.clientX;ty=t.clientY;sw=1},{passive:false});
document.getElementById('gc').addEventListener('touchmove',function(e){e.preventDefault();if(!sw||!S.run||S.over)return;const t=e.changedTouches[0],dx=t.clientX-tx,dy=t.clientY-ty;if(Math.abs(dx)>12||Math.abs(dy)>12){if(Math.abs(dx)>Math.abs(dy)){dx>0&&S.lane<2?S.targetLane=++S.lane:dx<0&&S.lane>0&&(S.targetLane=--S.lane)}else{ddy<0&&!S.jump?(S.jump=true,S.vy=S.jp,S.slide=false):dy>0&&!S.slide&&!S.jump&&(S.slide=true,S.st=15)}sw=0}},{passive:false});
document.getElementById('gc').addEventListener('touchend',function(e){e.preventDefault();sw=0},{passive:false});
document.addEventListener('keydown',function(e){
  if(!S.run||S.over)return;
  if(e.key==='ArrowLeft'&&S.lane>0)S.targetLane=--S.lane;
  else if(e.key==='ArrowRight'&&S.lane<2)S.targetLane=++S.lane;
  else if((e.key==='ArrowUp'||e.key===' '||e.key==='w')&&!S.jump){e.preventDefault();S.jump=true;S.vy=S.jp;S.slide=false;}
  else if((e.key==='ArrowDown'||e.key==='s')&&!S.slide&&!S.jump)S.slide=true,S.st=15;
});

bl2.addEventListener('touchstart',function(e){e.preventDefault();if(S.run&&!S.over&&S.lane>0)S.targetLane=--S.lane});
bl2.addEventListener('mousedown',function(){if(S.run&&!S.over&&S.lane>0)S.targetLane=--S.lane});
br2.addEventListener('touchstart',function(e){e.preventDefault();if(S.run&&!S.over&&S.lane<2)S.targetLane=++S.lane});
br2.addEventListener('mousedown',function(){if(S.run&&!S.over&&S.lane<2)S.targetLane=++S.lane});
ab2.addEventListener('touchstart',function(e){e.preventDefault();if(S.run&&!S.over&&!S.jump){S.jump=true;S.vy=S.jp;S.slide=false}});
ab2.addEventListener('mousedown',function(){if(S.run&&!S.over&&!S.jump){S.jump=true;S.vy=S.jp;S.slide=false}});

pb.addEventListener('click',function(){reset();S.run=true;ov.classList.add('h')});
rb2.addEventListener('click',function(){goDiv.classList.add('h');reset();S.run=true;sd.textContent='🏃 0';cdE.textContent='⭐ 0'});

// ===== ANIMATION LOOP =====
function anim(){
  requestAnimationFrame(anim);
  
  if(S.run&&!S.over){
    const dt=0.016;
    S.frame++;
    
    // Player horizontal
    const tx2=S.lx[S.targetLane];
    player.position.x+=(tx2-player.position.x)*.15;
    
    // Jump
    if(S.jump){S.vy+=S.grav*dt*60;player.position.y+=S.vy;if(player.position.y<=0){player.position.y=0;S.jump=false;S.vy=0;}}
    
    // Slide
    if(S.slide){S.st--;player.scale.y=.5;player.position.y=-.35;if(S.st<=0){S.slide=false;player.scale.y=1;player.position.y=0;}}
    
    // Bob
    if(!S.jump&&!S.slide)player.position.y+=Math.sin(S.frame*.2)*.003;
    
    // Spawn
    S.stm++;S.cst++;
    if(S.stm>=Math.max(20,50-S.spd)){S.stm=0;spawnObs()}
    if(S.cst>=60+Math.floor(Math.random()*30)){S.cst=0;spawnCoin()}
    
    // Move obstacles toward camera
    const speed=S.spd*dt;
    for(const o of S.obs){o.z+=speed;o.mesh.position.z=o.z;}
    for(const c of S.coins){c.position.z+=speed;c.rotation.z+=.1;}
    for(const c of S.coins){if(c.position.z>6){c.visible=false;}}
    
    // Clean far objects
    for(let i=S.obs.length-1;i>=0;i--){if(S.obs[i].z>8){scene.remove(S.obs[i].mesh);S.obs.splice(i,1);}}
    for(let i=S.coins.length-1;i>=0;i--){if(!S.coins[i].visible){scene.remove(S.coins[i]);S.coins.splice(i,1);}}
    
    // Collisions
    checkCollisions();
    
    // Score (faster)
    S.score++;
    
    // Speed
    if(S.frame%150===0&&S.spd<22)S.spd+=0.5;
    
    sd.textContent='🏃 '+Math.floor(S.score/10);
    cdE.textContent='⭐ '+S.coins;
  }
  
  if(S.over){
    // Slow decay for remaining objects
    for(const o of S.obs)o.mesh.position.z+=0.05;
  }
  
  camera.lookAt(0,0,-5);
  renderer.render(scene,camera);
}

// ===== START =====
reset();
anim();
})();
</script>
</body>
</html>
